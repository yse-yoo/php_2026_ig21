<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps API Basic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #map { height: 520px; }
    </style>
</head>

<body class="min-h-screen bg-slate-100 p-6 text-slate-800">
    <main class="mx-auto max-w-4xl space-y-5">

        <header class="space-y-2">
            <p class="text-sm font-bold uppercase tracking-wide text-blue-600">Google Maps API</p>
            <h1 class="text-3xl font-bold">Maps JavaScript API</h1>
        </header>

        <!-- 操作パネル：現在地ボタン + メッセージ表示 -->
        <section class="flex items-center gap-4">
            <button id="btn-current" type="button"
                class="rounded-lg border border-slate-300 bg-white px-5 py-2.5 text-sm font-bold text-slate-700 transition hover:bg-slate-50 active:scale-[0.98]">
                📍 現在地
            </button>
            <p id="message" class="mt-3 min-h-5 text-sm text-slate-600"></p>
        </section>

        <!-- スポット一覧 -->
        <section class="space-y-3">
            <div id="spot-list" class="grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-3">
                <!-- JS で生成 -->
            </div>
        </section>

        <!-- 地図 -->
        <section class="overflow-hidden rounded-lg bg-white shadow">
            <div id="map"></div>
        </section>


    </main>

    <script src="js/basic.js"></script>
    <!-- TODO: Google Maps API の読み込み: API キーを設定 -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_Key&callback=initMap"
        async defer></script>
</body>

</html>

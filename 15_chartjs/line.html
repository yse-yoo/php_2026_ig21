<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>睡眠時間と生産性の関係</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-slate-100 min-h-screen">

    <!-- ─── Header ─── -->
    <header class="bg-white border-b border-slate-200 shadow-sm">
        <div class="max-w-2xl mx-auto px-6 py-4 flex items-center justify-between">
            <div>
                <h1 class="text-xl font-bold text-slate-800">💤 睡眠時間と生産性の関係</h1>
                <p class="text-xs text-slate-400 mt-0.5">睡眠時間（h）と生産性スコア（1〜10）の相関</p>
            </div>
            <a href="index.html" class="text-xs text-slate-400 hover:text-slate-600 transition-colors">← Back</a>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-8 space-y-5">

        <!-- ─── Stats ─── -->
        <div class="grid grid-cols-3 gap-4">
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 text-center">
                <p class="text-xs text-slate-400 mb-1">最適睡眠時間</p>
                <p id="stat-best-sleep" class="text-2xl font-extrabold text-slate-800">—</p>
                <p class="text-xs text-slate-400 mt-0.5">時間</p>
            </div>
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 text-center">
                <p class="text-xs text-slate-400 mb-1">最高生産性</p>
                <p id="stat-max-score" class="text-2xl font-extrabold text-slate-800">—</p>
                <p class="text-xs text-slate-400 mt-0.5">/ 10</p>
            </div>
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 text-center">
                <p class="text-xs text-slate-400 mb-1">データ数</p>
                <p id="stat-count" class="text-2xl font-extrabold text-slate-800">—</p>
                <p class="text-xs text-slate-400 mt-0.5">件</p>
            </div>
        </div>

        <!-- ─── Chart ─── -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
            <canvas id="lineChart"></canvas>
        </div>

        <!-- ─── Insight ─── -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-5 flex gap-4">
            <span class="text-2xl shrink-0">💡</span>
            <div>
                <p class="text-sm font-semibold text-slate-700 mb-1">インサイト</p>
                <p id="insight-text" class="text-xs text-slate-500 leading-relaxed">—</p>
            </div>
        </div>

    </main>

    <script src="js/line.js"></script>
</body>

</html>

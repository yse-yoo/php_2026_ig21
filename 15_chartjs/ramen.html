<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ラーメン人気ランキング</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-slate-100 min-h-screen">

    <!-- ─── Header ─── -->
    <header class="bg-white border-b border-slate-200 shadow-sm">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div>
                <h1 class="text-xl font-bold text-slate-800">🍜 ラーメン人気ランキング</h1>
                <p class="text-xs text-slate-400 mt-0.5 tracking-wide">男女別・総合集計ダッシュボード</p>
            </div>
            <div id="message" class="text-sm text-red-500 font-medium"></div>
            <a href="index.html" class="text-xs text-slate-400 hover:text-slate-600 transition-colors">← Back</a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8 space-y-6">
        <!-- ─── Ranking ─── -->
        <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
            <h2 class="text-2xl font-semibold text-slate-400 uppercase tracking-widest mb-5">総合ランキング</h2>
            <div id="total-container"></div>
        </section>

        <!-- 横棒グラフ（総合） -->
        <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex flex-col">
            <h2 class="text-2xl font-semibold text-slate-400 uppercase tracking-widest mb-5">総合分布</h2>
            <div class="flex-1 flex items-center justify-center">
                <canvas id="stackedChart"></canvas>
            </div>
        </section>

        <!-- 棒グラフ（男女別） -->
        <section class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-slate-200 p-6">
            <h2 class="text-2xl font-semibold text-slate-400 uppercase tracking-widest mb-5">男女別 得票数</h2>
            <canvas id="barChart"></canvas>
        </section>

    </main>

    <!-- JS互換用（未使用） -->
    <div id="gender-container" class="hidden"></div>

    <script src="js/ramen.js"></script>
</body>

</html>

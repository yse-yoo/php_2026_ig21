<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>投票結果</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-slate-100 min-h-screen">

    <!-- ─── Header ─── -->
    <header class="bg-white border-b border-slate-200 shadow-sm">
        <div class="max-w-2xl mx-auto px-6 py-4 flex items-center justify-between">
            <div>
                <h1 class="text-xl font-bold text-slate-800">🗳️ 投票結果</h1>
                <p class="text-xs text-slate-400 mt-0.5">Red / Blue / Yellow の得票数</p>
            </div>
            <a href="index.html" class="text-xs text-slate-400 hover:text-slate-600 transition-colors">← Back</a>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-8 space-y-5">

        <!-- ─── Stats ─── -->
        <div class="grid grid-cols-3 gap-4">
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 text-center">
                <p class="text-xs text-slate-400 mb-1">合計票数</p>
                <p id="stat-total" class="text-2xl font-extrabold text-slate-800">—</p>
                <p class="text-xs text-slate-400 mt-0.5">票</p>
            </div>
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 text-center">
                <p class="text-xs text-slate-400 mb-1">最多得票</p>
                <p id="stat-top-label" class="text-2xl font-extrabold text-slate-800">—</p>
                <p id="stat-top-value" class="text-xs text-slate-400 mt-0.5">— 票</p>
            </div>
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 text-center">
                <p class="text-xs text-slate-400 mb-1">最少得票</p>
                <p id="stat-low-label" class="text-2xl font-extrabold text-slate-800">—</p>
                <p id="stat-low-value" class="text-xs text-slate-400 mt-0.5">— 票</p>
            </div>
        </div>

        <!-- ─── Chart ─── -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
            <canvas id="barChart"></canvas>
        </div>

        <!-- ─── Breakdown ─── -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm divide-y divide-slate-100">
            <div id="breakdown"></div>
        </div>

    </main>

    <script src="js/bar.js"></script>
</body>

</html>
